name: Team Rank Monitor

on:
  schedule:
    # 30분마다 갱신 (GitHub Actions + Playwright 부하 고려)
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Refresh team rankings
        run: python scripts/refresh_team_rankings.py --by github-actions

      - name: Commit rankings if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update team rankings [skip ci]"
          file_pattern: data/team_rankings.json
          branch: ${{ github.ref_name }}
